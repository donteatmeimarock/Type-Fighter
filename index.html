<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyomino Packing Puzzle</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header>
            <h1>Block Matrix</h1>
            <p>Fill the entire square grid to match the target layout.</p>
            <div class="level-controls">
                <label for="level-select">Choose Level:</label>
                <select id="level-select" class="glass-select">
                    <option value="0">Level 1</option>
                    <option value="1">Level 2</option>
                    <option value="2">Level 3</option>
                </select>
            </div>
        </header>

        <div class="game-section">
            <div id="game-board" class="grid-container main"></div>
        </div>

        <div class="tray-section">
            <h2>Pieces Tray</h2>
            <div id="pieces-tray" class="tray-container"></div>
        </div>
    </div>

    <div id="victory-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Puzzle Solved!</h2>
            <p>You perfectly matched the pattern.</p>
            <button id="restart-btn" class="glass-btn">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
